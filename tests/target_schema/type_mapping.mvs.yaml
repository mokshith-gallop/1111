suites:
  # --- nbcs_staging (45 tables) ---
  - pattern: schema_conformance
    id: staging-type-mapping
    target_dataset: dmt_build_staging
    source_database: staging
    tables:
      - table: stg_crm_client
        source_table: stg_crm_client
        expect_object_type: TABLE
        partition_by: load_date
        columns:
          - { name: client_id, type: INT64, source_type: BIGINT }
          - { name: client_code, type: STRING, source_type: STRING }
          - { name: client_name, type: STRING, source_type: STRING }
          - { name: industry, type: STRING, source_type: STRING }
          - { name: hq_country, type: STRING, source_type: STRING }
          - { name: status, type: STRING, source_type: STRING }
          - { name: created_ts, type: INT64, source_type: BIGINT }
          - { name: updated_ts, type: INT64, source_type: BIGINT }
          - { name: load_date, type: DATE, source_name: load_date, source_type: STRING }
      - table: stg_crm_client_contact
