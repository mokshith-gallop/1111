# Type-mapping schema_conformance — WITH source cross-check (AC2, AC8)
# Verifies every column's Hive->BigQuery type mapping against the live source catalog.
# source_setup applies legacy HQL to our Hive sandbox; the harness reads back
# source_database.source_table and cross-checks source_type vs target type.
name: type_mapping_schema_conformance

connections:
  source: { engine: impala }
  target: { engine: bigquery }

source_setup:
  location_base: ${SOURCE_WAREHOUSE:-/tmp/dmt_src}
  ddl:
    - /workspace/source/hive/ddl/01-create-databases.hql
    - /workspace/source/hive/ddl/02-staging-sqoop-mirrors.hql
    - /workspace/source/hive/ddl/03-staging-delta-feeds.hql
    - /workspace/source/hive/ddl/04-staging-file-feeds.hql
    - /workspace/source/hive/ddl/05-ods-cleanse.hql
    - /workspace/source/hive/ddl/06-ods-delta-scd2.hql
    - /workspace/source/hive/ddl/07-ods-acid.hql
    - /workspace/source/hive/ddl/08-dm-tables.hql

